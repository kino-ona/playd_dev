<script>
var g_page = 1;
var g_listsize = 8;
var g_type = '';
var g_order = '';
var isLoading = false;

$(document).ready(function(){

	ajaxItemList();

});

function ajaxItemList(){
	var keyword = '';//$('#insightLetter-search').val();
	if(isLoading) return;
	isLoading = true;
		$.ajax({
                    type: "POST",
                    url: '/ajax/ajax_board_list.php',
                    data: {
                        'type':g_type,
                        'order':g_order,
                        'keyword':keyword,
                        'page':g_page,
                        'listsize':g_listsize,
                        'code':'playdportfolio',
                    },
                    dataType: 'json',
                    timeout: 60000,
                    cache: false,
                    crossDomain: false,
                    error: function (request, error) {
                        isLoading = false;
                        console.log(error + '');
                    },
                    success: function (json) {
                        isLoading = false;
                        if (!json || !$.isArray(json.list)) {
                            return;
                        }
                        if (g_listsize * g_page >= json['count']) {
                            $('.button__wrap--seemore').hide();
                        } else {
                            $('.button__wrap--seemore').show();
                        }
                        if ($('#totalCount').length) {
                            $('#totalCount').html(json['count']);
                        }
                        fetchItemList(json.list, json.count);
                        if (json.count === 0) {
                            $('.sub-content__warning').show();
                        } else {
                            $('.sub-content__warning').hide();
                        }
                    }
        });
}

function fetchItemList(json, count){
		var html = '';
		for (var i = 0; i < json.length; i++) {
			var image = '';
			var alt = '';
			var title = (json[i]['B_TITLE'] || '').replace(/<br\s*\/?>/gi, '');
			var datestr = '';

			var tags_txt = '';
			if (json[i]['B_CONT1'] != null && json[i]['B_CONT1'] !== '') {
				var tags_arr = String(json[i]['B_CONT1']).split(',');
				for (var k = 0; k < tags_arr.length; k++) {
					if (tags_arr[k].replace(/\s/g, '') !== '') {
						tags_txt += '<span># ' + tags_arr[k].trim() + '</span>';
					}
				}
			}

			if (json[i]['B_SITE'] == 'MULTI') {
				datestr = json[i]['B_EXT5'];
			} else {
				datestr = json[i]['B_EXT6'];
				if (datestr) {
					datestr = datestr.substring(0, datestr.length - 1);
				}
			}

			/* /m/ 페이지: PC 브라우저로 열어도 썸네일 나오게 B_FILE2 우선, 없으면 B_FILE1 */
			if (json[i]['B_FILE2']) {
				image = json[i]['B_FILE2'];
			} else if (json[i]['B_FILE1']) {
				image = json[i]['B_FILE1'];
			}
			if (json[i]['B_EXT2']) {
				alt = json[i]['B_EXT2'];
			} else if (json[i]['B_EXT1']) {
				alt = json[i]['B_EXT1'];
			}

			var lock_str = '';
			if (json[i]['B_NOTI_YN'] == 'L') {
				html += '<a href="javascript:;" class="pfList__item pfList__item--locked">';
			} else {
				html += '<a href="portfolio_detail.html?seq=' + json[i]['B_SEQ'] + '&page=' + g_page + '" class="pfList__item">';
			}

			var imgCss = image ? "background-image: url('" + String(image).replace(/'/g, "\\'") + "');" : '';
			html += '<div class="pfList__inner" style="' + imgCss + '" title="' + String(alt).replace(/"/g, '&quot;') + '">';
			html += '<div class="group">';
			html += '<p class="pfList__client">' + nvl(json[i]['B_EXT3']) + '</p>';
			html += '<p class="pfList__name">' + nvl(json[i]['B_TITLE']) + '</p>';
			html += '<div class="hastag">' + tags_txt + '</div>';
			html += '</div>';
			html += '</div>';
			html += '</a>';



		// html+='<div class="list-content"><a href="javascript:;">';
		// html+='<div class="list-content__cover">';
		// html+='<div class="list-content__image" style="background-image:url('+image+')" title="'+alt+'"></div>';
		// html+='<div class="list-content__info">';
		// html+='<p class="list-content__info--1"><span class="list-content__info--2">'+nvl(datestr)+'</span>'+nvl(json[i]['B_EXT4'])+'</p>';
		// html+='<p class="list-content__info--3">'+nvl(json[i]['B_BRIEF'])+'</p>';
		// html+='</div>';
		// html+='</div>';
		// html+='<div class="list-content__head">';
		// html+='<span class="list-content__sort">'+nvl(json[i]['B_TYPE'])+'</span>';
		// html+='<span class="list-content__meta">'+nvl(json[i]['B_EXT3'])+'</span>';
		// html+='</div>';
		// html+='<p class="list-content__title">'+nvl(json[i]['B_TITLE'])+'</p>';
		// html+='</a></div>';

	}

	$('.pfList__list').append(html);

}
function itemMore(){
	g_page = g_page + 1;
	ajaxItemList();
}
function itemOrder(ord){
	g_page = 1;
	g_order = ord;
	$('.pfList__list').empty();
	ajaxItemList();
}
function yearSelect(year, cnt){
	g_page = 1;
	g_type = year;
	$('.sub-tabs__box .sub-tabs__item').removeClass('sub-tabs__item--active');
	$('#years_' + cnt).addClass('sub-tabs__item--active');

	$('.pfList__list').empty();
	ajaxItemList();
}
function keywordSelect(){
	g_page = 1;
	$('.pfList__list').empty();
	ajaxItemList();
}
function enterSelect(){
	if (window.event.keyCode == 13) {
		g_page = 1;
		$('.pfList__list').empty();
		ajaxItemList();
	}
}
