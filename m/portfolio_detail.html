<script>
	
	$(document).ready(function() {
        var navigation = new Swiper(".pfDetail .navigation__list", {
            slidesPerView: 3.6,
            pagination: {
                el: ".pfDetail .navigation__list .swiper-pagination",
                type: "progressbar"
            }
        });

		const firstItem = $('.navigation__list .swiper-slide').first();
		const firstItemVideoSrc = firstItem.find('.figure').data('video');
		const firstItemYTSrc = firstItem.find('.figure').data('youtube');
		
		if (firstItemVideoSrc) {
			$('.bigVideo source').attr('src', firstItemVideoSrc);
			$('.bigVideo')[0].load();
			$('.bigVideo').show();
			$('.bigImage').hide();
				$('.bigYoutube').hide();
			$('.bigVideo')[0].play();
		}
		if (firstItemYTSrc) {
			$('.bigYoutube').attr('src', firstItemYTSrc);
			$('.bigYoutube').show();
			$('.bigVideo').hide();
			$('.bigImage').hide();
		}

		$('.navigation__list .swiper-slide').on('click', function(event) {
			event.preventDefault();

			$('.navigation__item').removeClass('navigation__item--actived');
			$(this).addClass('navigation__item--actived');
			
			const videoSrc = $(this).find('.figure').data('video');
			const youtubeSrc = $(this).find('.figure').data('youtube');
			const imageSrc = $(this).find('.figure').data('image');
			
			if (videoSrc) {
				$('.bigVideo source').attr('src', videoSrc);
				$('.bigVideo')[0].load();
				$('.bigVideo').show();
				$('.bigImage').hide();
				$('.bigVideo')[0].play();
				$('.bigYoutube').hide();
			} else if (imageSrc) {
				$('.bigImage').attr('src', imageSrc).show();
				$('.bigVideo').hide();
				$('.bigVideo')[0].pause();
				$('.bigVideo')[0].currentTime = 0;
				$('.bigYoutube').hide();
			} else if (youtubeSrc) {
				$('.bigYoutube').attr('src', youtubeSrc).show();
				$('.bigImage').hide();
				$('.bigVideo').hide();
				$('.bigVideo')[0].pause();
				$('.bigVideo')[0].currentTime = 0;
				}
		});
	});
</script>
