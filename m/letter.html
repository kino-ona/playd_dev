<script>
var g_page = 1;
var g_listsize = 6;
var g_year = '';
var isLoading = false;

$(document).ready(function(){
	
	ajaxItemList();

});

function ajaxItemList(){
	var keyword = $('#insightLetter-search').val();
	if(isLoading) return;
	isLoading = true;
		$.ajax({
                    type: "POST",
                    url: '/ajax/ajax_board_list.php',
                    data: {
                        'year':g_year,
						'keyword':keyword,
						'page':g_page,
						'listsize':g_listsize,
						'code':'nsmnw',
                    },
                    dataType: 'json',
                    timeout: 60000,
                    cache: false,
                    crossDomain: false,
                    error: function (request, error) {
                        console.log(error + '');
                    },
                    success: function (json) {
						isLoading = false;
                        if(json){
							if(g_listsize * g_page >= json['count']){
								$('.button__wrap--seemore').hide();
							} else {
								$('.button__wrap--seemore').show();
							}
							fetchItemList(json['list'], json['count']);

							if(json['count'] == 0){
								$('.sub-content__warning').show();
							} else {
								$('.sub-content__warning').hide();
							}
							
                        }
                    }
        });
}

function fetchItemList(json, count){
		var html = '';
		for(var i=0;i<json.length;i++){
			var image = '';
			var alt = '';
			var vol = count - ((g_page-1) * g_listsize) - i;//json[i]['B_SEQ'];     return records - ((int(page) - 1) * int(listsize) ) - (index -1 )

			var datestr = json[i]['B_YEAR'] + '.' + json[i]['B_MONTH'];

			<?php if ($is_mobile){?>
			if(json[i]['B_FILE2']){
				image = json[i]['B_FILE2'];
			}
			if(json[i]['B_EXT2']){
				alt = json[i]['B_EXT2'];
			}
			<?php } else { ?>
			if(json[i]['B_FILE1']){
				image = json[i]['B_FILE1'];
			}
			if(json[i]['B_EXT1']){
				alt = json[i]['B_EXT1'];
			}
			<?php } ?>

			html+='<div class="list-content"><a href="./letter-detail.html?seq=' + json[i]['B_SEQ'] + '&vol=' + vol + '">';
			html+='<div class="list-content__cover"><p class="list-content__image" style="background-image:url('+image+')" title="'+alt+'"></p></div>';
			html+='<p class="list-content__title"><span class="numbering">Vol. '+vol+'</span> '+json[i]['B_TITLE']+'</p>';
			html+='<p class="list-content__description">'+datestr+'</p>';
			html+='</a></div>';
			
		}

		$('.sub-content').append(html);
		
}
function itemMore(){
	g_page = g_page + 1;
	ajaxItemList();
}
function yearSelect(year){
	g_page = 1;
	g_year = year;
	$("button[id^='years_']").each(function (i, el) {
		$(this).removeClass('sub-tabs__item--active');
	});
	$('#years_' + year).addClass('sub-tabs__item--active');

	$('.sub-content').empty();
	ajaxItemList();
}
function keywordSelect(){
	g_page = 1;
	$('.sub-content').empty();
	ajaxItemList();
}
function enterSelect(){
	if (window.event.keyCode == 13) {
		g_page = 1;
		$('.sub-content').empty();
		ajaxItemList();
	}
}

</script>
