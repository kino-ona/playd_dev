<script>
var g_page = 1;
var g_listsize = 6;
var g_type = '';
var g_order = '';

$(document).ready(function(){
	
	ajaxItemList();

});

function ajaxItemList(){
	var keyword = $('#insightLetter-search').val();
	if(isLoading) return;
	isLoading = true;
		$.ajax({
                    type: "POST",
                    url: '/ajax/ajax_board_list.php',
                    data: {
                        'type':g_type,
						'order':g_order,
						'keyword':keyword,
						'page':g_page,
						'listsize':g_listsize,
						'code':'nsmexp',
                    },
                    dataType: 'json',
                    timeout: 60000,
                    cache: false,
                    crossDomain: false,
                    error: function (request, error) {
                        console.log(error + '');
                    },
                    success: function (json) {
						isLoading = false;
                        if(json){
							if(g_listsize * g_page >= json['count']){
								$('.button__seemore').hide();
							} else {
								$('.button__seemore').show();
							}
							$('#totalCount').html(json['count']);
							fetchItemList(json['list'], json['count']);

							if(json['count'] == 0){
								$('.sub-content__warning').show();
							} else {
								$('.sub-content__warning').hide();
							}
							
                        }
                    }
        });
}

function fetchItemList(json, count){
		var html = '';
		for(var i=0;i<json.length;i++){
			var image = '';
			var alt = '';
			var vol = json[i]['B_SEQ'];//count - ((g_page-1) * g_listsize) - i;//json[i]['B_SEQ'];     return records - ((int(page) - 1) * int(listsize) ) - (index -1 )
			var title = json[i]['B_BRIEF'].replace('<br/>','').replace('<br>','');
			var cont = json[i]['B_CONT'].replace(/(<([^>]+)>)/gi, "").substring(0,120);
			var datestr = '';

			if(json[i]['B_SEND_DT']){
				datestr = json[i]['B_REGDATE'].substring(0,4) + '.' + json[i]['B_REGDATE'].substring(5,7);
			} else {
				datestr = json[i]['B_REGDATE'].substring(0,4) + '.' + json[i]['B_REGDATE'].substring(5,7);
			}
			

			<?phpif($is_mobile){?>
			if(json[i]['B_FILE2']){
				image = json[i]['B_FILE2'];
			}
			if(json[i]['B_EXT2']){
				alt = json[i]['B_EXT2'];
			}
			<?php}else{?>
			if(json[i]['B_FILE1']){
				image = json[i]['B_FILE1'];
			}
			if(json[i]['B_EXT1']){
				alt = json[i]['B_EXT1'];
			}
			<?php}?>


			html+='<div class="list-content list-content--long"><a href="./column-detail.html?seq='+json[i]['B_SEQ']+'">';
			html+='<div class="list-content__image" style="background-image:url('+image+')"></div>';
			html+='<div class="list-content__head">';
			html+='<span class="list-content__sort">'+nvl(json[i]['B_TYPE'])+'</span>';
			html+='</div>';
			html+='<p class="list-content__title list-content__title--long">'+title+'</p>';
			html+='<p class="list-content__description" style="word-break:break-all;">'+cont+'</p>';
			html+='<span class="list-content__meta">'+datestr+'</span>';
			html+='</a></div>';

		}

		$('.sub-content').append(html);
		
}
function itemMore(){
	g_page = g_page + 1;
	ajaxItemList();
}
function itemOrder(ord){
	g_page = 1;
	g_order = ord;
	$('.sub-content').empty();
	ajaxItemList();
}
function yearSelect(year, cnt){
	g_page = 1;
	g_type = year;
	$("button[id^='years_']").each(function (i, el) {
		$(this).removeClass('sub-tabs__item--active');
	});
	$('#years_' + cnt).addClass('sub-tabs__item--active');

	$('.sub-content').empty();
	ajaxItemList();
}
function keywordSelect(){
	g_page = 1;
	$('.sub-content').empty();
	ajaxItemList();
}
function enterSelect(){
	if (window.event.keyCode == 13) {
		g_page = 1;
		$('.sub-content').empty();
		ajaxItemList();
	}
}
