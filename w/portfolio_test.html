<script>
  var g_page = 1;
  var g_listsize = 20;
  var g_type = '';
  var g_order = '';
  var isLoading = false; // 로딩 상태 체크 변수

    $(document).ready(function () {
      ajaxItemList(); // 페이지 로딩 시 아이템 리스트 호출
    });

    function ajaxItemList() {
      var keyword = $('#insightLetter-search').val();
      if (isLoading) return; // 로딩 중이면 종료
      isLoading = true;

      $.ajax({
        type: "POST",
        url: '/ajax/ajax_board_list.php',
        data: {
          'type': g_type,
          'order': g_order,
          'keyword': keyword,
          'page': g_page,
          'listsize': g_listsize,
          'code': 'playdportfolio',
        },
        dataType: 'json',
        timeout: 60000,
        cache: false,
        crossDomain: false,
        error: function (request, error) {
          console.log(error + '');
          isLoading = false; // 에러 발생 시 로딩 상태 초기화
        },
        success: function (json) {
          isLoading = false; // 로딩 종료

          if (json) {
            if (g_listsize * g_page >= json['count']) {
              $('.button__seemore').hide();
            } else {
              $('.button__seemore').show();
            }
            $('#totalCount').html(json['count']);
            fetchItemList(json['list'], json['count']); // 데이터 처리 함수 호출
          }
        }
      });
    }

      function fetchItemList(json, count) {
          var html = '';

          // "테스트 카테고리"를 제외하는 필터링을 JSON 데이터에서 한 번 더 수행
          var filteredJson = json.filter(function (item) {
            return item['B_TYPE'] !== '테스트 카테고리';
          });

          for (var i = 0; i < filteredJson.length; i++) {
            var image = '';
            var alt = '';
            var title = filteredJson[i]['B_TITLE'].replace('<br/>', '').replace('<br>', '');
            var datestr = '';

            if (filteredJson[i]['B_SITE'] == 'MULTI') {
              datestr = filteredJson[i]['B_EXT5'];
            } else {
              datestr = filteredJson[i]['B_EXT6'];
              if (datestr) {
                datestr = datestr.substring(0, datestr.length - 1);
              }
            }

        <?php if  ($is_mobile) { ?>
        if (filteredJson[i]['B_FILE2']) {
                image = filteredJson[i]['B_FILE2'];
              }
              if (filteredJson[i]['B_EXT2']) {
                alt = filteredJson[i]['B_EXT2'];
              }
        <?php } else { ?>
        if (filteredJson[i]['B_FILE1']) {
                image = filteredJson[i]['B_FILE1'];
              }
              if (filteredJson[i]['B_EXT1']) {
                alt = filteredJson[i]['B_EXT1'];
              }
        <?php } ?>

            html += '<div class="list-content"><a href="javascript:;">';
            html += '<div class="list-content__cover">';
            html += '<div class="list-content__image" style="background-image:url(' + image + ')" title="' + alt + '"></div>';
            html += '<div class="list-content__info">';
            html += '<p class="list-content__info--1"><span class="list-content__info--2">' + nvl(datestr) + '</span>' + nvl(filteredJson[i]['B_EXT4']) + '</p>';
            html += '<p class="list-content__info--3">' + nvl(filteredJson[i]['B_BRIEF']) + '</p>';
            html += '</div>';
            html += '</div>';
            html += '<div class="list-content__head">';
            html += '<span class="list-content__sort">' + nvl(filteredJson[i]['B_TYPE']) + '</span>';
            html += '<span class="list-content__meta">' + nvl(filteredJson[i]['B_EXT3']) + '</span>';
            html += '</div>';
            html += '<p class="list-content__title">' + nvl(filteredJson[i]['B_TITLE']) + '</p>';
            html += '</a></div>';
          }

          $('.sub-content').append(html);
        }


      // "더 보기" 버튼 클릭 시 페이지 증가 후 아이템 호출
      function itemMore() {
        console.log('===', g_page)
        g_page = g_page + 1; // 페이지 증가
        ajaxItemList(); // 새로운 페이지 아이템 호출
      }



    // 정렬 기능
    function itemOrder(ord) {
      g_page = 1; // 페이지 초기화
      g_order = ord; // 정렬 방식 설정
      $('.sub-content').empty(); // 콘텐츠 비우기
      ajaxItemList(); // 아이템 리스트 호출
    }

    // 카테고리 선택 기능
    function yearSelect(year, cnt) {
      g_page = 1; // 페이지 초기화
      g_type = year; // 카테고리 설정
      $("button[id^='years_']").removeClass('sub-tabs__item--active'); // 활성화 클래스 제거
      $('#years_' + cnt).addClass('sub-tabs__item--active'); // 선택된 카테고리 활성화

      $('.sub-content').empty(); // 콘텐츠 비우기
      ajaxItemList(); // 아이템 리스트 호출
    }

    // 키워드 검색 기능
    function keywordSelect() {
      g_page = 1; // 페이지 초기화
      $('.sub-content').empty(); // 콘텐츠 비우기
      ajaxItemList(); // 아이템 리스트 호출
    }

    // 엔터 키로 검색
    function enterSelect() {
      if (window.event.keyCode == 13) {
        g_page = 1; // 페이지 초기화
        $('.sub-content').empty(); // 콘텐츠 비우기
        ajaxItemList(); // 아이템 리스트 호출
      }
    }

  $(document).ready(function () {
    // 페이지 로드 후 약간의 딜레이를 두고 itemMore()를 호출
    setTimeout(function () {
      g_page = 1;
      itemMore();
    }, 500); // 500ms 딜레이
  });
</script>
