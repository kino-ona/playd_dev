<script>
$(function () {
	const vol = new URL(location.href).searchParams.get('vol');
	$('.head_numbering').text(vol);
});
function letterWriteProc(){
	
	if($('#user-name').val()=='') {
		alert('이름을 입력해 주세요.');
		return;
	}
	if($('#user-profession').val()==''){
		alert('직업을 입력해 주세요.');
		return;
	}
	if($('#user-mail').val()==''){
		alert('이메일을 입력해 주세요.');
		return;
	}
	if(!validateEmail($('#user-mail').val())){
		alert('이메일을 다시 입력해 주세요.');
		return;
	}
	if($('#user-position').val()==''){
		alert('직급을 입력해 주세요.');
		return;
	}
	if($('#user-company').val()==''){
		alert('회사명(소속)을 입력해 주세요.');
		return;
	}
	if($('#user-team').val()==''){
		alert('부서(팀명)을 입력해 주세요.');
		return;
	}
	if(!$("input:checkbox[id='sub-checkbox--personal']").is(":checked")){
		alert('개인정보 수집 및 이용에 동의해주세요.');
		return;
	}

	if(isLoading) return;
	isLoading = true;
	
	$.ajax({
                    type: "POST",
                    url: '/ajax/ajax_board_proc.php',
                    data: {
                        'user_name':$('#user-name').val(),
						'user_profession':$('#user-profession').val(),
						'user_mail':$('#user-mail').val(),
						'user_position':$('#user-position').val(),
						'user_company':$('#user-company').val(),
						'user_team':$('#user-team').val(),
						'cmd':'letter_write',
                    },
                    dataType: 'json',
                    timeout: 60000,
                    cache: false,
                    crossDomain: false,
                    error: function (request, error) {
                        console.log(error + '');
                    },
                    success: function (json) {
						isLoading = false;
						if(json['success']){
							layerOpen('letterFormSubmitted');
							$('#user-name').val('');
							$('#user-profession').val('');
							$('#user-mail').val('');
							$('#user-position').val('');
							$('#user-company').val('');
							$('#user-team').val('');
						}
                    }
    });
}

function kakaoShareLink(){

	var title = '<?=nvldesc($itemOne['B_TITLE'])?>';
	var desc = '<?=nvldesc($itemOne['B_TITLE'])?>';

	var imageUrl = '<?=getBaseUrl()?>/assets/images/common/sns_share2.jpg';
	kakaoShare(title, desc, imageUrl);
}

</script>
