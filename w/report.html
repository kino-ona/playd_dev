<script>
var g_page = 1;
var g_listsize = 6;
var g_type = '';
var g_order = '';

$(document).ready(function(){
	
	ajaxItemList();

});

function ajaxItemList(){
	var keyword = $('#insightLetter-search').val();
	if(isLoading) return;
	isLoading = true;
		$.ajax({
                    type: "POST",
                    url: '/ajax/ajax_board_list.php',
                    data: {
                        'type':g_type,
						'order':g_order,
						'keyword':keyword,
						'page':g_page,
						'listsize':g_listsize,
						'code':'report',
                    },
                    dataType: 'json',
                    timeout: 60000,
                    cache: false,
                    crossDomain: false,
                    error: function (request, error) {
                        console.log(error + '');
                    },
                    success: function (json) {
						isLoading = false;
                        if(json){
							if(g_listsize * g_page >= json['count']){
								$('.button__seemore').hide();
							} else {
								$('.button__seemore').show();
							}
							$('#totalCount').html(json['count']);
							fetchItemList(json['list'], json['count']);

							if(json['count'] == 0){
								$('.sub-content__warning').show();
							} else {
								$('.sub-content__warning').hide();
							}
							
                        }
                    }
        });
}

function fetchItemList(json, count){
		var html = '';
		for(var i=0;i<json.length;i++){
			var image = '';
			var alt = '';
			var vol = json[i]['B_SEQ'];//count - ((g_page-1) * g_listsize) - i;//json[i]['B_SEQ'];     return records - ((int(page) - 1) * int(listsize) ) - (index -1 )
			var title = json[i]['B_TITLE'].replace('<br/>','').replace('<br>','');

			var datestr = json[i]['B_SEND_DT'].substring(0,4) + '.' + json[i]['B_SEND_DT'].substring(5,7);

			<?php if ($is_mobile){?>
			if(json[i]['B_FILE4']){
				image = json[i]['B_FILE4'];
			}
			if(json[i]['B_EXT4']){
				alt = json[i]['B_EXT4'];
			}
			<?php } else { ?>
			if(json[i]['B_FILE3']){
				image = json[i]['B_FILE3'];
			}
			if(json[i]['B_EXT3']){
				alt = json[i]['B_EXT3'];
			}
			<?php } ?>

			html+='<div class="list-content">';
			html+='<a href="javascript:;" class="list-content__cover">';
			html+='<div class="list-content__image" onclick="javascript:location.href=\'report-detail.html?seq='+json[i]['B_SEQ']+'\'" style="background-image:url('+image+')"></div>';
			html+='<div class="button__wrap">';
			html+='<div class="open button button__icon-download"  onclick="javascript:download(\''+json[i]['FI_SEQ']+'\', \''+nvl(json[i]['B_LINKURL'])+'\', \''+nvl(json[i]['B_SEQ'])+'\');"><span class="a11y">다운로드 받기</span></div>';

			html+='<span class="list-content__meta">'+datestr+'</span>';
			html+='</div>';

		}

		$('.sub-content').append(html);
		
}
function itemMore(){
	g_page = g_page + 1;
	ajaxItemList();
}
function itemOrder(ord){
	g_page = 1;
	g_order = ord;
	$('.sub-content').empty();
	ajaxItemList();
}
function yearSelect(year, cnt){
	g_page = 1;
	g_type = year;
	$("button[id^='years_']").each(function (i, el) {
		$(this).removeClass('sub-tabs__item--active');
	});
	$('#years_' + cnt).addClass('sub-tabs__item--active');

	$('.sub-content').empty();
	ajaxItemList();
}
function keywordSelect(){
	g_page = 1;
	$('.sub-content').empty();
	ajaxItemList();
}
function enterSelect(){
	if (window.event.keyCode == 13) {
		g_page = 1;
		$('.sub-content').empty();
		ajaxItemList();
	}
}



function download(val, url,seq){
	g_val = val;
	g_url = url;
	g_seq = seq;

	layerOpen('report');
}
