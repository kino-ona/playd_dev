<script>
	$(document).ready(function() {
			const firstItem = $('.navigation__item').first();
			const firstItemVideoSrc = firstItem.data('video');
			const firstItemYTSrc = firstItem.data('youtube');
			
			if (firstItemVideoSrc) {
				$('.bigVideo source').attr('src', firstItemVideoSrc);
				$('.bigVideo')[0].load();
				$('.bigVideo').show();
				$('.bigYoutube').hide();
				$('.bigImage').hide();
				$('.bigVideo')[0].play();
			} 
			if (firstItemYTSrc) {
				$('.bigYoutube').attr('src', firstItemYTSrc);
				$('.bigYoutube').show();
				$('.bigVideo').hide();
				$('.bigImage').hide();
			}

			$('.navigation__item').on('click', function(event) {
				event.preventDefault();
				
				$('.navigation__item').removeClass('navigation__item--actived');
				$(this).addClass('navigation__item--actived');
				
				const videoSrc = $(this).data('video');
				const youtubeSrc = $(this).data('youtube');
				const imageSrc = $(this).data('image');
				
				if (videoSrc) {
					$('.bigVideo source').attr('src', videoSrc);
					$('.bigVideo')[0].load();
					$('.bigVideo').show();
					$('.bigVideo')[0].play();
					$('.bigImage').hide();
					$('.bigYoutube').hide();
				} else if (imageSrc) {
					$('.bigImage').attr('src', imageSrc).show();
					$('.bigVideo').hide();
					$('.bigVideo')[0].pause();
					$('.bigVideo')[0].currentTime = 0;
					$('.bigYoutube').hide();
				} else if (youtubeSrc) {
					$('.bigYoutube').attr('src', youtubeSrc).show();
					$('.bigImage').hide();
					$('.bigVideo').hide();
					$('.bigVideo')[0].pause();
					$('.bigVideo')[0].currentTime = 0;
				}
			});
    });
</script>
