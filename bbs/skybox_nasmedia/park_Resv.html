<style>
 body{font-family: 'Malgun Gothic','NanumGothic','dotum',sans-serif;color:#444;-webkit-text-size-adjust:none;-webkit-user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color: rgba(0,0,0,0);overflow-y: visible !important;letter-spacing:-0.25;font-size:14px;}

html,body{width:100%;}
