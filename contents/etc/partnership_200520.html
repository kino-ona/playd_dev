<script>
    function email_chg(val) {
        var email = $("input[name='email[]']");

        if(val == "") {
            email.eq(1).attr("readonly", false);
            email.eq(1).val("");
            email.eq(1).focus();
        } else {
            email.eq(1).val(val);
            email.eq(1).attr("readonly", true);
        }
    }

    function form_submit() {
        if(form_check_partnership()) $("#partnership_form").submit();
    }

    function form_check_partnership() {
        var email = $("input[name='email[]']");

        if(!$("#agreedChk").is(":checked")) {
            alert("개인정보 수집 이용에 동의해주시기 바랍니다.");
            return false;
        } else if($.trim($("input[name='company']").val()) == "") {
            alert("회사명을 입력해주시기 바랍니다.");
            return false;
        } else if($.trim($("input[name='name']").val()) == "") {
            alert("이름을 입력해주시기 바랍니다.");
            return false;
        } else if($("input[name='phone']").val() == "") {
            alert("연락처를 입력해주시기 바랍니다.");
            return false;
        } else if($("input[name='email']").val() == "") {
            alert("이메일 주소를 입력해주시기 바랍니다.");
            return false;
        } else if($.trim($("textarea[name='content']").val()) == "") {
            alert("문의 내용을 입력해주시기 바랍니다.");
            return false;
        }

        return true;
    }
</script>
