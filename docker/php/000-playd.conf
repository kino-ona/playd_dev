<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options FollowSymLinks
        AllowOverride All
        Require all granted
        AddType application/x-httpd-php .php .html

        # 저장소에 없는 w/m 전용 이미지 요청 → 더미로 404 방지 (원본은 운영 서버/별도 패키지)
        RewriteEngine On
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^assets/images/w/.*\.(png|gif|webp|svg)$ assets/images/dummy/@thum01.png [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^assets/images/w/.*\.jpe?g$ assets/images/dummy/@banner01.jpg [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^assets/images/m/.*\.(png|gif|webp|svg)$ assets/images/dummy/@thum01.png [L]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^assets/images/m/.*\.jpe?g$ assets/images/dummy/@banner01.jpg [L]

        # swiper / countUp CDN (파일 미포함)
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^assets/js/w/swiper\.min\.js$ https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.js [R=302,L,NC]
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteRule ^assets/js/m/swiper\.min\.js$ https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.js [R=302,L,NC]
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
