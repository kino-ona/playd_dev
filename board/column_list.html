<script>
    function quick_form_check() {
        if(!$('input:checkbox[id="agreedY"]').is(":checked")) {
            alert("개인정보 수집에 동의해주시기 바랍니다.");
            return false;
        }
		if($("input[name='news_email']").val() == "") {
            alert("이메일 주소를 입력해주시기 바랍니다.");
            return false;
        }

		var emailVal = $("#news_email").val();
		var regExp = /^[0-9a-zA-Z]([-_.]?[0-9a-zA-Z])*@[0-9a-zA-Z]([-_.]?[0-9a-zA-Z])*.[a-zA-Z]{2,3}$/i;
		// 검증에 사용할 정규식 변수 regExp에 저장

		if (emailVal.match(regExp) == null) {
			alert("이메일 주소를 정확하게 입력해주시기 바랍니다.");
            return false;
		}
        return true;
    }
</script>
